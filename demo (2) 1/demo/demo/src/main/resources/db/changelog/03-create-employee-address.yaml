databaseChangeLog:
  - changeSet:
      id: 3
      author: yourname
      changes:
        - createTable:
            tableName: employee_address
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: employee_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: street
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: city
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: state
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: zip_code
                  type: VARCHAR(20)
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: employee_address
            baseColumnNames: employee_id
            referencedTableName: employee
            referencedColumnNames: id
            constraintName: fk_employee_address_employee